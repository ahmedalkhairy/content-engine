# Production: web + worker on a dedicated host port (multi-project servers)
# Usage:
#   1. Copy .env.example → .env and set APP_PORT, APP_PUBLIC_URL, secrets
#   2. docker compose -f docker-compose.prod.yml up -d --build
#
# Optional HTTPS via Caddy (only if ports 80/443 are free on this host):
#   docker compose -f docker-compose.prod.yml --profile caddy up -d --build

services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./storage:/app/storage
    ports:
      - "${APP_BIND:-0.0.0.0}:${APP_PORT:-8010}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./storage:/app/storage
    depends_on:
      web:
        condition: service_healthy
    command: python -m app worker --interval 60

  caddy:
    profiles: ["caddy"]
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
