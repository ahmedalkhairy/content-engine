# nginx site for Content Engine on a shared VPS
# Copy: sudo cp deploy/nginx-content.infrapilot.tech.conf /etc/nginx/sites-available/content-engine
# Enable: sudo ln -sf /etc/nginx/sites-available/content-engine /etc/nginx/sites-enabled/
# Test:   sudo nginx -t && sudo systemctl reload nginx
# SSL:    sudo certbot --nginx -d content.infrapilot.tech

server {
    listen 80;
    listen [::]:80;
    server_name content.infrapilot.tech;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# After certbot, a second server { listen 443 ssl; ... } block is added automatically.
